name: Daily Digest

on:
  schedule:
    # 每天 0:00 UTC = 北京 08:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Install minimal deps（daily 不重建 signals.db，只刷高频源 + LLM）
        run: |
          python -m pip install --upgrade pip
          pip install feedparser huggingface_hub socksio

      - name: 刷高频源 (RSS + HN + HF trending + arXiv)
        run: |
          python3 rss_w2.py            || echo "  rss_w2 soft"
          python3 w3_sources.py        || echo "  w3_sources soft"
          python3 fix_hf.py            || echo "  fix_hf soft"
          python3 w4_extra_sources.py  || echo "  w4_extra soft"

      - name: Daily LLM Digest (gpt-5.4-mini 排序+编辑今日 3 件事)
        env:
          UYILINK_API_KEY: ${{ secrets.UYILINK_API_KEY }}
          UYILINK_BASE_URL: ${{ secrets.UYILINK_BASE_URL }}
        run: python3 daily_digest.py

      - name: 重建 news 站（注入今日 digest 到 hero）
        run: |
          python3 build_news.py zh
          python3 build_news.py en

      - name: Commit + push (触发 Vercel 重发)
        run: |
          git config user.name "northstar-bot"
          git config user.email "northstar-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "无变化, 跳过 commit"
          else
            git commit -m "daily: digest $(date -u +%Y-%m-%d)"
            git push
          fi
